name: Build and Push MFE Docker Image

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout authn code
        uses: actions/checkout@v4
        with:
          path: authn-src

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Tutor MFE build
        run: |
          pip install tutor-mfe==21.0.0
          tutor plugins enable mfe
          tutor config save
          TUTOR_ENV=$(tutor config printroot)
          BUILD_DIR="$TUTOR_ENV/../env/plugins/mfe/build/mfe"
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          echo "Tutor env: $TUTOR_ENV"
          ls $BUILD_DIR

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_DIR }}
          push: true
          build-contexts: |
            authn-src=authn-src
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/openedx-mfe:21.0.0-indigo
