name: Build and Push MFE Docker Image

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout authn code
        uses: actions/checkout@v4
        with:
          path: authn-src

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clone Tutor MFE plugin
        run: |
          pip install tutor-mfe==21.0.0
          tutor plugins enable mfe
          tutor config save
          cp -r authn-src /root/.local/share/tutor/env/plugins/mfe/build/mfe/authn-override

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: /root/.local/share/tutor/env/plugins/mfe/build/mfe
          push: true
          build-contexts: |
            authn-src=authn-src
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/openedx-mfe:21.0.0-indigo
