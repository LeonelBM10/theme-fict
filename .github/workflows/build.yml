name: Build and Push MFE Docker Image

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clone Tutor MFE build context
        run: |
          git clone https://github.com/overhangio/tutor-mfe.git
          cp -r . tutor-mfe/tutormfe/plugin/apps/mfe/build/mfe/authn-src/

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: tutor-mfe/tutormfe/plugin/apps/mfe/build/mfe
          push: true
          build-contexts: |
            authn-src=.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/openedx-mfe:21.0.0-indigo
